name: Notify Controller of upnote changes

on:
  push:
    branches: [main]
    paths:
      - 'controller-note/**'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to NP_ClaudeAgent controller
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${CONTROLLER_TOKEN}" \
            https://api.github.com/repos/Blueberry0120x/NP_ClaudeAgent/dispatches \
            -d '{"event_type":"upnote-updated","client_payload":{"repo":"MasterSiteDashboard","ref":"'"${GITHUB_SHA}"'"}}'
        env:
          CONTROLLER_TOKEN: ${{ secrets.PUBLIC_MIRROR_PAT }}
