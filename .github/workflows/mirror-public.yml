name: Mirror to ParcelDashboard (public)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MasterSiteDashboard
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Strip internal dev files only (keep real data)
        run: |
          rm -rf .claude/ .vscode/ .github/
          rm -f  .env .env.*

      - name: Fix cross-links in docs/ for static hosting
        run: |
          # Map links to checklist via dev server route "/checklist" — fix to static path
          sed -i 's|href="checklist"|href="PreApp_Checklist.html"|g' docs/InteractiveMap.html
          sed -i 's|href="checklist"|href="PreApp_Checklist.html"|g' docs/InteractiveMap_Mobile.html

          # Checklist links to map via dev server route "/" — fix to static path
          sed -i "s|href=\"/\"|href=\"InteractiveMap.html\"|g" docs/PreApp_Checklist.html
          sed -i "s|href=\"/\"|href=\"InteractiveMap_Mobile.html\"|g" docs/PreApp_Checklist_Mobile.html

      - name: Add mobile auto-detection to docs/ HTML
        run: |
          # Auto-detect script: redirects mobile users to mobile version and vice versa
          MOBILE_DETECT='<script>(function(){var m=/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)||window.innerWidth<=768;'

          # Desktop InteractiveMap -> redirect to mobile if on phone
          SCRIPT="${MOBILE_DETECT}if(m&&!location.pathname.includes(\"_Mobile\"))location.replace(location.pathname.replace(\".html\",\"_Mobile.html\"));})()</script>"
          sed -i "s|</head>|${SCRIPT}\n</head>|" docs/InteractiveMap.html
          sed -i "s|</head>|${SCRIPT}\n</head>|" docs/PreApp_Checklist.html

          # Mobile versions -> redirect to desktop if NOT on phone
          SCRIPT_DESK="${MOBILE_DETECT}if(!m&&location.pathname.includes(\"_Mobile\"))location.replace(location.pathname.replace(\"_Mobile\",\"\"));})()</script>"
          sed -i "s|</head>|${SCRIPT_DESK}\n</head>|" docs/InteractiveMap_Mobile.html
          sed -i "s|</head>|${SCRIPT_DESK}\n</head>|" docs/PreApp_Checklist_Mobile.html

      - name: Inject dark mode into docs/ HTML
        run: |
          # Dark mode CSS block — overrides CSS custom properties for all pages
          DARK_CSS='<style>@media(prefers-color-scheme:dark){:root{--primary:#5ba3e6;--secondary:#2d3748;--accent:#ff6b6b;--text:#e2e8f0;--bg:#0f172a;--card:#1e293b;--line:#334155;--cad-bg:#0a0a0a;--cad-text:#e0e0e0;--cad-border:#555;--cad-accent:#e090e0}body{background:#0f172a!important;color:#e2e8f0!important}.suite-bar{background:#1e293b!important}input,select,textarea{background:#1e293b!important;color:#e2e8f0!important;border-color:#334155!important}.header{border-color:#334155!important}h1{color:#5ba3e6!important}.card,.section-card,.adv-card{background:#1e293b!important;border-color:#334155!important;color:#e2e8f0!important}.stat-label,.banner-label{color:#94a3b8!important}a{color:#93c5fd}}</style>'

          # Inject before </head> in all 4 main HTML files
          for f in docs/InteractiveMap.html docs/InteractiveMap_Mobile.html docs/PreApp_Checklist.html docs/PreApp_Checklist_Mobile.html; do
            sed -i "s|</head>|${DARK_CSS}\n</head>|" "$f"
          done

          # Also add dark theme-color meta tags
          for f in docs/InteractiveMap.html docs/InteractiveMap_Mobile.html docs/PreApp_Checklist.html docs/PreApp_Checklist_Mobile.html; do
            sed -i 's|<meta name="theme-color" content="#0f4c81">|<meta name="theme-color" content="#0f4c81" media="(prefers-color-scheme: light)"><meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">|' "$f"
          done

      - name: Commit mirror snapshot
        run: |
          git config user.name "mirror-bot"
          git config user.email "mirror-bot@users.noreply.github.com"
          git add -A
          git commit -m "Mirror from MasterSiteDashboard (real data, dark mode, links fixed, mobile auto-detect)" --allow-empty

      - name: Force-push to ParcelDashboard
        run: |
          git push --force https://x-access-token:${MIRROR_TOKEN}@github.com/Blueberry0120x/ParcelDashboard.git HEAD:main
        env:
          MIRROR_TOKEN: ${{ secrets.PUBLIC_MIRROR_PAT }}
