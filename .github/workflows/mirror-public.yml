name: Mirror to ParcelDashboard (public)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MasterSiteDashboard
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Sanitize all sensitive data
        run: |
          echo "=== Phase 1: Remove sensitive dirs/files ==="
          rm -rf .claude/ .vscode/ .github/ exports/
          rm -rf ProjectDev-Checklist-Legacy/
          rm -f  .env .env.*

          echo "=== Phase 2: Replace site-data.json ==="
          cat > data/site-data.json <<'EOF'
          {
            "project": "Parcel Dashboard (Demo)",
            "site": {
              "address": "123 Demo Street, San Diego, CA 92101",
              "apn": "000-000-00-00",
              "zoning": "DEMO-ZONE",
              "lotWidth": 50,
              "lotDepth": 125,
              "lotSF": 6250,
              "commercialDepth": 30,
              "baseFAR": 2.0,
              "commFAR": 6.5,
              "maxHeight": 50,
              "baseHeightLimit": 45,
              "cchsMaxHeight": 95,
              "frontSetback": 10,
              "rearSetback": 10,
              "sideSetback": 0,
              "densityPerSF": 600,
              "nefRatePerSF": 11.78,
              "affordabilityPct": 0.40,
              "difPerUnit": 15000,
              "difWaiverSF": 500,
              "inspectors": []
            },
            "saved": {}
          }
          EOF

          echo "=== Phase 3: Scrub PII from all text files ==="

          # Address replacements
          find . -type f \( -name '*.html' -o -name '*.js' -o -name '*.json' \
            -o -name '*.md' -o -name '*.ps1' -o -name '*.cmd' -o -name '*.css' \
            -o -name '*.txt' \) -exec sed -i \
            -e 's/4333 \&amp; 4335 Euclid Avenue, San Diego, CA 92105/123 Demo Street, San Diego, CA 92101/g' \
            -e 's/4335 Euclid Avenue, San Diego, CA 92105/123 Demo Street, San Diego, CA 92101/g' \
            -e 's/4335 Euclid Ave/123 Demo St/g' \
            -e 's/4335 Euclid/123 Demo/g' \
            -e 's/471-271-16-00/000-000-00-00/g' \
            -e 's/471-271-16/000-000-00/g' \
            -e 's/CUPD-CU-2-4/DEMO-ZONE/g' \
            {} +

          # Inspector PII replacements (names + phone numbers)
          find . -type f \( -name '*.html' -o -name '*.js' -o -name '*.json' \
            -o -name '*.md' -o -name '*.ps1' -o -name '*.cmd' -o -name '*.txt' \) -exec sed -i \
            -e 's/Wesley Tukker (619-446-5362)/Demo Inspector (000-000-0000)/g' \
            -e 's/Ricardo Ordonez (619-446-5123)/Demo Inspector (000-000-0000)/g' \
            -e 's/Richard Gable (858-573-1223)/Demo Inspector (000-000-0000)/g' \
            -e 's/Christopher Sorchy (619-236-7033)/Demo Inspector (000-000-0000)/g' \
            -e 's/Alejandro Ruiz (858-627-2034)/Demo Inspector (000-000-0000)/g' \
            -e 's/Wesley Tukker/Demo Inspector/g' \
            -e 's/Ricardo Ordonez/Demo Inspector/g' \
            -e 's/Richard Gable/Demo Inspector/g' \
            -e 's/Christopher Sorchy/Demo Inspector/g' \
            -e 's/Alejandro Ruiz/Demo Inspector/g' \
            -e 's/619-446-5362/000-000-0000/g' \
            -e 's/619-446-5123/000-000-0000/g' \
            -e 's/858-573-1223/000-000-0000/g' \
            -e 's/619-236-7033/000-000-0000/g' \
            -e 's/858-627-2034/000-000-0000/g' \
            {} +

          echo "=== Phase 4: Rename legacy files with address in name ==="
          find . -name "*4335*" -exec bash -c 'mv "$1" "$(echo "$1" | sed "s/4335_Euclid/Demo_Site/g")"' _ {} \;

          echo "=== Sanitization complete ==="

      - name: Commit sanitized snapshot
        run: |
          git config user.name "mirror-bot"
          git config user.email "mirror-bot@users.noreply.github.com"
          git add -A
          git commit -m "Mirror from MasterSiteDashboard (sanitized)" --allow-empty

      - name: Force-push to ParcelDashboard
        run: |
          git push --force https://x-access-token:${MIRROR_TOKEN}@github.com/Blueberry0120x/ParcelDashboard.git HEAD:main
        env:
          MIRROR_TOKEN: ${{ secrets.PUBLIC_MIRROR_PAT }}
