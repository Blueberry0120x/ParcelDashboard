const {useState,useEffect,useCallback,useRef}=React;
function useMobile(bp=768){const[m,setM]=useState(()=>window.innerWidth<bp);useEffect(()=>{const h=()=>setM(window.innerWidth<bp);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[bp]);return m;}
const SD = window.__SITE_DEFAULTS__ || {};

// Seed checklist buildings from map's live localStorage state, then fall back to baked SD
function seedFromMap(){
  // 1. Live map state — written by map's ExportEngine.save() to localStorage['site_state']
  //    Works in serve mode (shared localhost origin). No-op in file:// mode (different origins).
  let src=null;
  try{const raw=localStorage.getItem('site_state');if(raw){const p=JSON.parse(raw);if(p&&p.saved&&p.saved.buildings&&p.saved.buildings.length)src={buildings:p.saved.buildings,commFront:p.saved.commFront};}}catch(e){}
  // Migration: check old key
  if(!src){try{const raw=localStorage.getItem('building_config');if(raw){const p=JSON.parse(raw);if(p&&p.buildings&&p.buildings.length)src=p;}}catch(e){}}
  // 2. Baked build-time state from site-data.json via __SITE_DEFAULTS__
  if(!src){if(!SD.buildings||!SD.buildings.length)return null;src={buildings:SD.buildings,commFront:SD.commFront};}
  const out=[];
  src.buildings.forEach((b,i)=>{
    const type=(i===0&&src.commFront)?"Commercial":"Residential";
    const n=b.count||1;
    for(let j=0;j<n;j++)out.push({type,w:b.W||18,d:b.D||40,stories:b.stories||1,unitsPerFloor:1});
  });
  return out.length?out:null;
}

const GLOSSARY = [
  {term:"SDA",full:"Sustainable Development Area",def:"City of San Diego zone within ~1 mile walking distance of high-frequency transit. Sites must be in an SDA to qualify for CCHS. Verify on ZAPP map."},
  {term:"CCHS",full:"Complete Communities Housing Solutions",def:"San Diego's opt-in parallel zoning program (2020). Removes density caps and height limits near transit in exchange for affordable units and a Neighborhood Enhancement Fund fee."},
  {term:"Ministerial",full:"",def:"Approval that is automatic by law — the city must approve if code requirements are met. No public hearing, no CEQA review. CCHS projects are ministerial. Contrast: Discretionary."},
  {term:"Discretionary",full:"",def:"Approval requiring a public hearing or planning commission decision, where the city exercises judgment. Adds months to the timeline. Standard permit pathway (non-CCHS) may be discretionary."},
  {term:"CEQA",full:"California Environmental Quality Act",def:"State law requiring environmental impact analysis before discretionary approvals. Ministerial projects (including CCHS) are categorically exempt from CEQA."},
  {term:"SDMC",full:"San Diego Municipal Code",def:"The local law book governing land use, zoning, building standards, and fees in San Diego. Sections referenced throughout (e.g., Sec.143.1010 = CCHS; Sec.155.0240 = CUPD zoning)."},
  {term:"DSD",full:"Development Services Department",def:"The City of San Diego department that issues building permits, reviews plans, enforces zoning, and assigns Development Project Managers. Main point of contact for all permits."},
  {term:"CUPD",full:"Commercial Urbanist Planned Development",def:"Zoning overlay covering this site. CU-2-4 = sub-district 4, which requires commercial use in the front 30 ft and restricts operating hours to 6 AM-midnight."},
  {term:"DPM",full:"Development Project Manager",def:"DSD staff member assigned to coordinate all disciplines (planning, structural, MEP, engineering) on a Multiple Discipline Preliminary Review. Acts as single point of contact."},
  {term:"DU",full:"Dwelling Unit",def:"One residential apartment or home, counted for density purposes. Commercial suites, lobbies, and storage do NOT count as DUs."},
  {term:"AMI",full:"Area Median Income",def:"HUD-published income benchmark for a geographic area, updated annually. Affordable housing deed-restrictions are set as a percentage of AMI (e.g., 50% AMI = very low income, 120% AMI = moderate income)."},
  {term:"VLI",full:"Very Low Income",def:"Households earning 50% or less of AMI. The highest-priority affordable tier. Required for the most favorable density bonus under State Density Bonus Law (5% VLI units unlocks 20% bonus)."},
  {term:"APN",full:"Assessor Parcel Number",def:"Unique ID assigned to every parcel by the County Assessor (e.g., 471-271-16-00). Used to look up exact DIF fees via the City DIF Calculator, ownership records, and zoning verification."},
  {term:"STC",full:"Sound Transmission Class",def:"Lab rating measuring how well a wall or assembly blocks airborne sound (speech, music, TV). Higher STC = better isolation. Code minimum between units: STC 50 (lab) / 45 (field)."},
  {term:"IIC",full:"Impact Insulation Class",def:"Lab rating measuring how well a floor-ceiling assembly blocks impact noise (footsteps, dropped objects). Higher IIC = better. Code minimum: IIC 50 (lab) / 45 (field) per CBC S1206."},
  {term:"AFF",full:"Above Finish Floor",def:"Vertical measurement reference taken from the finished floor surface. Used for accessibility specifications — e.g., mailbox locks must be 15–67\" AFF per ADA standards."},
];

function HelpModal({helpKey,helpData,onClose}){
  const h=HELP[helpKey];if(!h)return null;
  const renderMd=text=>{if(!text)return null;return text.split('\n').map((line,i)=>{
    if(!line.trim())return <div key={i} style={{height:6}}/>;
    let html=line.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/\*(.+?)\*/g,'<i>$1</i>');
    if(html.startsWith('- '))return <div key={i} style={{paddingLeft:16,position:"relative",marginBottom:3,fontSize:13,lineHeight:1.5}} dangerouslySetInnerHTML={{__html:'<span style="position:absolute;left:4;color:#94a3b8">\u2022</span>'+html.slice(2)}}/>;
    return <div key={i} style={{marginBottom:4,fontSize:13,lineHeight:1.6}} dangerouslySetInnerHTML={{__html:html}}/>;
  })};

  const renderSdb=()=>{
    const {resiU=0,baseDMax=10}=helpData||{};
    const tiers=[5,10,15,20].map(p=>{
      const bonusPct=22.5+(p-5)*2.5;
      const affDU=Math.ceil(baseDMax*p/100);
      const bonusDU=Math.ceil(baseDMax*bonusPct/100);
      return{p,affDU,bonusDU,totalDU:baseDMax+bonusDU,bonusPct};
    });
    return(
      <div>
        <div style={{background:"#eff6ff",padding:"8px 12px",borderRadius:8,marginBottom:10,fontSize:12}}>
          Base zone max: <b>{baseDMax} DU</b> ({(SD.lotSF??6250).toLocaleString()} SF ÷ {SD.densityPerSF??600} SF/DU). &nbsp;Current proposal: <b>{resiU} DU</b>.
        </div>
        <div style={{fontSize:12,marginBottom:8}}>Offer affordable units to earn <b>bonus units</b> above the base max (GC §65915). Highlighted rows meet your current {resiU}-unit proposal:</div>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr style={{background:"#f1f5f9"}}>
            {["Affordable DU","% of Base","Income Target","Bonus %","+Units","Total DU"].map(h=><th key={h} style={{padding:"5px 8px",textAlign:"left",fontSize:10,fontWeight:700,borderBottom:"2px solid #e2e8f0"}}>{h}</th>)}
          </tr></thead>
          <tbody>
            {tiers.map((t,i)=>(
              <tr key={i} style={{borderBottom:"1px solid #f1f5f9",background:t.totalDU>=resiU?"#f0fdf4":"#fff"}}>
                <td style={{padding:"5px 8px",fontWeight:t.totalDU>=resiU?700:400}}>{t.affDU} unit{t.affDU!==1?"s":""}</td>
                <td style={{padding:"5px 8px"}}>{t.p}%</td>
                <td style={{padding:"5px 8px",fontSize:10,color:"#64748b"}}>LI ≤80% AMI or VLI ≤50%</td>
                <td style={{padding:"5px 8px"}}>{t.bonusPct}%</td>
                <td style={{padding:"5px 8px",color:"#16a34a",fontWeight:700}}>+{t.bonusDU}</td>
                <td style={{padding:"5px 8px",fontWeight:700,color:t.totalDU>=resiU?"#16a34a":"#1e293b"}}>{t.totalDU} DU {t.totalDU>=resiU?" \u2713":""}</td>
              </tr>
            ))}
          </tbody>
        </table>
        <div style={{marginTop:10,fontSize:11,color:"#64748b",lineHeight:1.7}}>
          <b>FAR stays at 2.0</b> — SDB adds units, not FAR (12,500 SF buildable max).<br/>
          <b>No NEF fee</b>. DIF applies — no general waiver under SDB (CCHS-only benefit).<br/>
          <b>Height</b> stays at 45 ft base limit unless you request a concession/waiver in writing.<br/>
          <b>Stacking:</b> SDB can be applied on top of CCHS for maximum density.
        </div>
      </div>
    );
  };

  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(15,30,50,.6)",backdropFilter:"blur(4px)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:16,maxWidth:600,width:"100%",maxHeight:"85vh",overflow:"hidden",display:"flex",flexDirection:"column",boxShadow:"0 25px 60px rgba(0,0,0,.25)"}}>
        <div style={{padding:"16px 20px 12px",borderBottom:"2px solid #e2e8f0",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div><div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1.5,color:"#64748b",marginBottom:2}}>Decision Guide</div>
          <div style={{fontSize:17,fontWeight:700,color:"#0f4c81"}}>{h.title}</div></div>
          <button onClick={onClose} style={{background:"#f1f5f9",border:"none",borderRadius:8,width:30,height:30,fontSize:16,cursor:"pointer",color:"#64748b",fontWeight:700,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>{"\u00D7"}</button>
        </div>
        <div style={{padding:"14px 20px 20px",overflowY:"auto",flex:1}}>
          {helpKey==="sdb"?renderSdb():<div style={{color:"#334155"}}>{renderMd(h.body)}</div>}
          {h.options&&helpKey!=="sdb"&&<div style={{marginTop:14}}>{Object.entries(h.options).map(([l,d])=>(
            <div key={l} style={{marginBottom:8,padding:"10px 14px",borderRadius:10,border:"1px solid #e2e8f0",background:"#f8fafc"}}>
              <div style={{fontSize:12,fontWeight:700,color:"#0f4c81",marginBottom:4}}>{l}</div>
              <div style={{color:"#475569"}}>{renderMd(d)}</div>
            </div>
          ))}</div>}
        </div>
      </div>
    </div>
  );
}

//  BUILDING CONFIGURATOR
// ═══════════════════════════════════════
function BuildingConfig({bldgs,setBldgs,sel,onSel,onHelp,mapLocked,onToggleLock,onRefresh,isMobile}){
  const LOT=SD.lotSF||6250;const mono="'JetBrains Mono',monospace";
  const [showLockMsg,setShowLockMsg]=useState(false);
  const update=(i,f,v)=>{const n=[...bldgs];n[i]={...n[i],[f]:v};setBldgs(n)};
  const add=()=>setBldgs([...bldgs,{type:"Residential",w:18,d:40,stories:3,unitsPerFloor:1}]);
  const remove=i=>{if(bldgs.length>1)setBldgs(bldgs.filter((_,j)=>j!==i))};

  const commB=bldgs.filter(b=>b.type==="Commercial"),resiB=bldgs.filter(b=>b.type==="Residential");
  const commSF=commB.reduce((s,b)=>s+b.w*b.d*b.stories,0);
  const resiSF=resiB.reduce((s,b)=>s+b.w*b.d*b.stories,0);
  const totalSF=commSF+resiSF;
  const commU=commB.reduce((s,b)=>s+b.unitsPerFloor*b.stories,0);
  const resiU=resiB.reduce((s,b)=>s+b.unitsPerFloor*b.stories,0);
  const far=totalSF/LOT;
  const resiPct=totalSF>0?(resiSF/totalSF*100):0;
  const baseDMax=Math.floor(LOT/(SD.densityPerSF??600));
  const pw=sel.pathway||"";const isCCHS=pw.includes("CCHS");const isSDB=pw.includes("STATE");
  const farLim=isCCHS?(SD.commFAR??6.5):(SD.baseFAR??2.0);
  const farOK=far<=farLim;
  // SDB live calc from user inputs
  const sdbAffDU=parseInt(sel.sdbAffDU)||0;
  const sdbTier=sel.sdbTier||"LI";
  const sdbIsModerate=sdbTier==="MOD";
  const sdbAffPct=baseDMax>0?sdbAffDU/baseDMax*100:0;
  const sdbMinPct=sdbIsModerate?10:5;
  const sdbMeetsMin=sdbAffPct>=sdbMinPct;
  const sdbBonusPct=sdbMeetsMin?(sdbIsModerate?5+(sdbAffPct-10)*1:22.5+(sdbAffPct-5)*2.5):0;
  const sdbBonusDU=sdbMeetsMin?Math.ceil(baseDMax*sdbBonusPct/100):0;
  const sdbTotalDU=baseDMax+sdbBonusDU;
  const sdbFits=resiU<=sdbTotalDU;
  const denOK=isCCHS||resiU<=baseDMax||(isSDB&&sdbMeetsMin&&sdbFits);
  const unitSF=resiB.length>0?resiB[0].w*resiB[0].d:0;
  const difWaiver=unitSF<=(SD.difWaiverSF??500);
  const preBonus=baseDMax;const affordReq=Math.ceil(preBonus*(SD.affordabilityPct??0.40));const nef=(SD.nefRatePerSF??11.78)*LOT;
  const difPerUnit=SD.difPerUnit??15000;
  const mktUnits=Math.max(0,resiU-affordReq);
  const difTotal=difWaiver?0:mktUnits*difPerUnit;
  const sb330OK=resiPct>=66.67;

  return (
    <div style={{marginBottom:10,borderRadius:10,overflow:"clip",border:"1px solid #d1d5db",background:"#fff",boxShadow:"0 1px 3px rgba(0,0,0,.04)"}}>
      <div style={{padding:"11px 16px",background:"linear-gradient(90deg,#7c3aed,#6d28d9)",color:"#fff",fontWeight:700,fontSize:13,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span>BUILDING CONFIGURATION</span>
          {SD.buildings&&SD.buildings.length>0&&<>
            <button onClick={onToggleLock} style={{padding:"2px 9px",borderRadius:5,border:`1.5px solid ${mapLocked?"rgba(251,191,36,.7)":"rgba(134,239,172,.7)"}`,background:mapLocked?"rgba(251,191,36,.12)":"rgba(134,239,172,.12)",color:mapLocked?"#fbbf24":"#86efac",fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{mapLocked?"Override":"Reset to Map"}</button>
            <button onClick={onRefresh} title="Reload page to pull latest map save" style={{padding:"2px 9px",borderRadius:5,border:"1.5px solid rgba(147,197,253,.6)",background:"rgba(147,197,253,.1)",color:"#93c5fd",fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>&#x21BB; Refresh</button>
          </>}
        </div>
        <HelpIcon k="unitSize" onOpen={onHelp}/>
      </div>

      {/* PATHWAY SELECTOR */}
      <div style={{padding:"12px 16px",borderBottom:"2px solid #e2e8f0",background:"linear-gradient(90deg,#faf5ff,#f5f3ff)"}}>
        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontSize:10,fontWeight:700,color:"#6b21a8",textTransform:"uppercase",letterSpacing:.8}}>Development Pathway:</span>
          <HelpIcon k="pathway" onOpen={onHelp}/>
          <Pill label="BASE ZONE (FAR 2.0)" active={pw==="BASE ZONE (FAR 2.0)"} onClick={()=>onSel("pathway",pw==="BASE ZONE (FAR 2.0)"?null:"BASE ZONE (FAR 2.0)")} color="#2563eb"/>
          <Pill label="CCHS TIER 3 (FAR 6.5)" active={isCCHS} onClick={()=>onSel("pathway",isCCHS?null:"CCHS TIER 3 (FAR 6.5)")} color="#7c3aed"/>
          <Pill label="STATE DENSITY BONUS" active={isSDB} onClick={()=>onSel("pathway",isSDB?null:"STATE DENSITY BONUS")} color="#0891b2"/>
          {isSDB&&<button onClick={()=>onHelp("sdb",{resiU,baseDMax})} style={{width:18,height:18,borderRadius:9,border:"1.5px solid #67e8f9",background:"linear-gradient(135deg,#ecfeff,#cffafe)",color:"#0891b2",fontSize:10,fontWeight:800,cursor:"pointer",fontFamily:"inherit",display:"inline-flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>?</button>}
        </div>
        {!pw&&<div style={{marginTop:6,fontSize:11,color:"#d97706",fontWeight:600}}>&#9888; Select a pathway to enable fee calculations and density checks</div>}
        {isSDB&&sdbAffDU>0&&sdbMeetsMin&&<div style={{marginTop:6,fontSize:11,fontWeight:700,color:sdbFits?"#0891b2":"#dc2626"}}>{sdbFits?"✓":"✗"} SDB: {sdbAffDU} deed-restricted ({sdbAffPct.toFixed(0)}% of base) → +{sdbBonusDU} bonus → {sdbTotalDU} DU total. {sdbFits?"Your "+resiU+" DU fits.":"Need "+(resiU-sdbTotalDU)+" more bonus units — increase affordable commitment."}</div>}
        {isSDB&&(!sdbAffDU||!sdbMeetsMin)&&<div style={{marginTop:6,fontSize:11,color:"#d97706",fontWeight:600}}>&#9888; Enter deed-restricted units in the SDB panel to calculate your bonus. Min {sdbMinPct}% of base ({Math.ceil(baseDMax*sdbMinPct/100)} unit{Math.ceil(baseDMax*sdbMinPct/100)!==1?"s":""}) required.</div>}
        {!isSDB&&pw&&!denOK&&<div style={{marginTop:6,fontSize:11,color:"#dc2626",fontWeight:700}}>&#10007; {resiU} DU exceeds base zone max of {baseDMax}. Switch to CCHS, SDB, or reduce units.</div>}
      </div>

      {/* Building rows + SDB panel */}
      <div style={{display:"flex",alignItems:"stretch",flexDirection:isMobile?"column":"row"}}>
      <div style={{position:"relative",flex:1}}>
        <div style={{padding:"10px 14px",pointerEvents:mapLocked?"none":undefined,opacity:mapLocked?.65:1}}>
          <div style={{overflowX:isMobile?"auto":"visible"}}>
          <div style={{display:"grid",gridTemplateColumns:"24px 88px 56px 56px 44px 44px 28px",gap:"3px 5px",fontSize:9,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:.5,marginBottom:3,minWidth:isMobile?320:undefined}}>
            <span>#</span><span>Type</span><span>W</span><span>D</span><span>Flr</span><span>U/F</span><span></span>
          </div>
          {bldgs.map((b,i)=>(
            <div key={i} style={{display:"grid",gridTemplateColumns:"24px 88px 56px 56px 44px 44px 28px",gap:"3px 5px",alignItems:"center",marginBottom:2}}>
              <span style={{fontSize:10,fontWeight:700,color:"#94a3b8",fontFamily:mono}}>{i+1}</span>
              <select value={b.type} onChange={e=>update(i,"type",e.target.value)} style={{padding:"3px 4px",borderRadius:5,border:"1.5px solid #cbd5e1",fontSize:10,fontFamily:"inherit",background:b.type==="Commercial"?"#fef3c7":"#ecfdf5",cursor:"pointer"}}>
                <option>Commercial</option><option>Residential</option>
              </select>
              {["w","d","stories","unitsPerFloor"].map(f=>(
                <input key={f} type="number" value={b[f]} min={f==="stories"||f==="unitsPerFloor"?1:1}
                  onChange={e=>update(i,f,+e.target.value||0)}
                  style={{padding:"3px 4px",borderRadius:5,border:"1.5px solid #cbd5e1",fontSize:11,fontFamily:mono,textAlign:"center",width:"100%"}}/>
              ))}
              <button onClick={()=>remove(i)} style={{background:"#fee2e2",border:"none",borderRadius:5,cursor:"pointer",color:"#dc2626",fontWeight:700,fontSize:13,width:24,height:24}}>{"\u00D7"}</button>
            </div>
          ))}
          </div>{/* end overflow wrapper */}
          <button onClick={add} style={{marginTop:4,marginLeft:29,padding:"4px 12px",borderRadius:8,border:"1.5px dashed #a78bfa",background:"#faf5ff",color:"#7c3aed",fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>+ Add Building</button>
        </div>
        {mapLocked&&(
          <div onClick={()=>setShowLockMsg(v=>!v)} style={{position:"absolute",inset:0,cursor:"pointer",background:"repeating-linear-gradient(45deg,rgba(100,116,139,.06),rgba(100,116,139,.06) 5px,transparent 5px,transparent 15px)",display:"flex",alignItems:"center",justifyContent:"center"}}>
            {showLockMsg&&(
              <div style={{background:"rgba(15,23,42,.93)",color:"#fff",padding:"12px 18px",borderRadius:10,textAlign:"center",lineHeight:1.65,maxWidth:270,boxShadow:"0 8px 24px rgba(0,0,0,.3)",pointerEvents:"none"}}>
                <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:"#94a3b8",marginBottom:4}}>Read-only</div>
                <div style={{fontSize:12,fontWeight:600,marginBottom:4}}>Value assigned from</div>
                <div style={{fontSize:13,fontWeight:700,color:"#a5b4fc",marginBottom:8}}>"MAP \u2014 Concept Design"</div>
                <div style={{fontSize:11,color:"#94a3b8"}}>Please contact designer for more information.</div>
              </div>
            )}
          </div>
        )}
      </div>

      {/* SDB Calculator Panel */}
      {isSDB&&(
        <div style={isMobile?{borderTop:"2px solid #a5f3fc",background:"#ecfeff",padding:"12px 14px",display:"flex",flexDirection:"column",gap:8}:{borderLeft:"2px solid #a5f3fc",background:"#ecfeff",padding:"12px 14px",minWidth:230,maxWidth:260,flexShrink:0,display:"flex",flexDirection:"column",gap:8}}>
          <div style={{fontSize:10,fontWeight:700,color:"#0e7490",textTransform:"uppercase",letterSpacing:.8}}>SDB Calculator</div>
          <div>
            <div style={{fontSize:9,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:.5,marginBottom:3}}>Deed-Restricted Units</div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <input type="number" min={0} max={baseDMax} value={sdbAffDU||""} placeholder="0"
                onChange={e=>onSel("sdbAffDU",e.target.value)}
                style={{width:52,padding:"4px 6px",borderRadius:6,border:"1.5px solid #67e8f9",fontSize:14,fontWeight:700,fontFamily:mono,textAlign:"center",background:"#fff"}}/>
              <span style={{fontSize:10,color:"#64748b"}}>of {baseDMax} base DU<br/><span style={{fontWeight:700,color:"#0891b2"}}>{sdbAffDU>0?sdbAffPct.toFixed(1)+"% of base":""}</span></span>
            </div>
          </div>
          <div>
            <div style={{fontSize:9,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:.5,marginBottom:3}}>Income Restriction</div>
            <select value={sdbTier} onChange={e=>onSel("sdbTier",e.target.value)}
              style={{width:"100%",padding:"4px 6px",borderRadius:6,border:"1.5px solid #67e8f9",fontSize:10,fontFamily:"inherit",background:"#fff"}}>
              <option value="LI">LI — Lower Income (≤80% AMI)</option>
              <option value="VLI">VLI — Very Low Income (≤50% AMI)</option>
              <option value="MOD">Moderate (≤120% AMI) — condos only</option>
            </select>
          </div>
          <div style={{borderTop:"1px solid #a5f3fc",paddingTop:8}}>
            {sdbAffDU===0&&<div style={{fontSize:10,color:"#94a3b8"}}>Enter units above to calculate bonus.</div>}
            {sdbAffDU>0&&!sdbMeetsMin&&<div style={{fontSize:10,color:"#dc2626",fontWeight:700}}>Min {sdbMinPct}% needed → {Math.ceil(baseDMax*sdbMinPct/100)} unit{Math.ceil(baseDMax*sdbMinPct/100)!==1?"s":""}</div>}
            {sdbAffDU>0&&sdbMeetsMin&&(
              <div style={{display:"grid",gridTemplateColumns:"auto 1fr",gap:"3px 8px",fontSize:11}}>
                <span style={{color:"#64748b"}}>Bonus rate:</span><span style={{fontWeight:700,color:"#0891b2"}}>{sdbBonusPct.toFixed(1)}%</span>
                <span style={{color:"#64748b"}}>Bonus units:</span><span style={{fontWeight:700,color:"#16a34a"}}>+{sdbBonusDU} DU</span>
                <span style={{color:"#64748b"}}>Total allowed:</span><span style={{fontWeight:800,fontSize:13,color:sdbFits?"#16a34a":"#dc2626"}}>{sdbTotalDU} DU {sdbFits?"✓":"✗"}</span>
                <span style={{color:"#64748b"}}>Your proposal:</span><span style={{fontWeight:700,color:sdbFits?"#16a34a":"#dc2626"}}>{resiU} DU {sdbFits?"fits":resiU-sdbTotalDU+" over"}</span>
              </div>
            )}
          </div>
        </div>
      )}
      </div>{/* end flex wrapper */}

      {/* Dashboard */}
      <div style={{borderTop:"2px solid #e2e8f0",padding:"10px 14px 10px 43px",display:"grid",gridTemplateColumns:isMobile?"auto 1fr":"auto 1fr auto 1fr",gap:"4px 8px",fontSize:11,alignItems:"baseline"}}>
        <span style={{color:"#64748b",fontWeight:600}}>Commercial:</span><span style={{fontWeight:700,fontFamily:mono}}>{commSF.toLocaleString()} SF / {commU} units</span>
        <span style={{color:"#64748b",fontWeight:600}}>Residential:</span><span style={{fontWeight:700,fontFamily:mono}}>{resiSF.toLocaleString()} SF / {resiU} units</span>
        <span style={{color:"#64748b",fontWeight:600}}>Total SF:</span><span style={{fontWeight:700,fontFamily:mono}}>{totalSF.toLocaleString()}</span>
        <span style={{color:"#64748b",fontWeight:600}}>Unit Size:</span><span style={{fontWeight:700,fontFamily:mono,color:difWaiver?"#16a34a":"#d97706"}}>{unitSF} SF {difWaiver?"(\u2713 DIF waived)":"(>500 SF)"}</span>
        <span style={{color:"#64748b",fontWeight:600}}>FAR:</span><span style={{fontWeight:700,fontFamily:mono,color:farOK?"#16a34a":"#dc2626"}}>{far.toFixed(2)} / {farLim} {farOK?"\u2713":"\u2717 OVER"}</span>
        <span style={{color:"#64748b",fontWeight:600}}>Density:</span><span style={{fontWeight:700,fontFamily:mono,color:denOK?"#16a34a":"#dc2626"}}>{resiU} DU / {isCCHS?"unlimited":isSDB&&sdbMeetsMin?sdbTotalDU+" (SDB)":baseDMax} {denOK?"\u2713":"\u2717"}</span>
      </div>

      {/* Status badges */}
      <div style={{borderTop:"2px solid #e2e8f0",padding:"8px 14px 8px 43px",display:"flex",gap:6,flexWrap:"wrap",fontSize:10}}>
        <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:7,height:7,borderRadius:4,background:sb330OK?"#22c55e":"#ef4444"}}/>SB 330: {resiPct.toFixed(0)}% resi {sb330OK?"(\u2265 67%)":"(need \u2265 67%)"}</span>
        {isCCHS&&<>
          <span style={{color:"#7c3aed",fontWeight:700}}>Affordable: {affordReq} units</span>
          <span style={{color:"#7c3aed",fontWeight:700}}>NEF: ${nef.toLocaleString(undefined,{maximumFractionDigits:0})}</span>
          <span style={{color:difWaiver?"#16a34a":"#d97706",fontWeight:700}}>DIF: {difWaiver?"$0 (all waived)":"~$"+difTotal.toLocaleString()+" ("+mktUnits+" mkt units)"}</span>
        </>}
        {isSDB&&sdbMeetsMin&&<>
          <span style={{color:"#0891b2",fontWeight:700}}>SDB Affordable: {sdbAffDU} units ({sdbTier})</span>
          <span style={{color:"#0891b2",fontWeight:700}}>Bonus: +{sdbBonusDU} DU ({sdbBonusPct.toFixed(1)}%)</span>
          <span style={{color:sdbFits?"#16a34a":"#dc2626",fontWeight:700}}>Total: {sdbTotalDU} DU {sdbFits?"✓":"✗"}</span>
        </>}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════
//  ADVISORY HELPERS (defined outside to maintain stable identity)
// ═══════════════════════════════════════
function AdvCard({id,title,isOpen,onToggle,children}){
  return (
    <div style={{marginBottom:8,borderRadius:10,overflow:"clip",border:"1px solid #e2e8f0",background:"#fff"}}>
      <button onClick={e=>{e.currentTarget.blur();onToggle(id)}} style={{width:"100%",padding:"10px 14px",border:"none",cursor:"pointer",fontFamily:"inherit",background:isOpen?"#f8fafc":"#fff",display:"flex",justifyContent:"space-between",alignItems:"center",textAlign:"left"}}>
        <span style={{fontSize:13,fontWeight:700,color:"#1e293b"}}>{title}</span>
        <span style={{fontSize:12,color:"#94a3b8",transition:"transform .2s",transform:isOpen?"rotate(0)":"rotate(-90deg)",display:"inline-block"}}>&#9662;</span>
      </button>
      {isOpen&&<div style={{padding:"4px 14px 14px"}} className="adv-card-body">{children}</div>}
    </div>
  );
}
function AB({children}){return <b style={{color:"#1e293b"}}>{children}</b>}
function ANum({children}){return <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,color:"#0f4c81"}}>{children}</span>}
function AWarn({children}){return <span style={{color:"#dc2626",fontWeight:700}}>{children}</span>}
function AGood({children}){return <span style={{color:"#16a34a",fontWeight:700}}>{children}</span>}
function ATag({color,children}){return <span style={{display:"inline-block",padding:"1px 8px",borderRadius:10,background:color,color:"#fff",fontSize:10,fontWeight:700,verticalAlign:"middle",marginRight:4}}>{children}</span>}
function ARef({n,onToggle}){return <span role="button" tabIndex={0} onClick={e=>{e.preventDefault();const el=document.querySelector('[data-fn="'+n+'"]');if(el)el.scrollIntoView({behavior:"smooth",block:"center"});onToggle("footnotes")}} style={{display:"inline-block",fontSize:9,fontWeight:700,color:"#2563eb",background:"#eff6ff",borderRadius:4,padding:"0 4px",textDecoration:"none",verticalAlign:"super",lineHeight:1,cursor:"pointer",border:"1px solid #bfdbfe"}}>{n}</span>}

// ═══════════════════════════════════════
//  ADVISORY SECTION
// ═══════════════════════════════════════
const ADV_KEYS=["overview","far_density","dif","sb330","ab2097","sb9","densitybonus","commercial","glossary","footnotes"];
function AdvisorySection({sel,bldgs,onHelp}){
  const [open,setOpen]=useState({"overview":true});
  const toggle=k=>setOpen(p=>({...p,[k]:!p[k]}));
  const allOpen=ADV_KEYS.every(k=>open[k]);
  const toggleAll=()=>{if(allOpen){setOpen({});}else{const o={};ADV_KEYS.forEach(k=>o[k]=true);setOpen(o);}};
  const resiB=bldgs.filter(b=>b.type==="Residential");
  const unitSF=resiB.length>0?resiB[0].w*resiB[0].d:720;
  const resiU=resiB.reduce((s,b)=>s+b.unitsPerFloor*b.stories,0);
  const isCCHS=(sel.pathway||"").includes("CCHS");const isSDB=(sel.pathway||"").includes("STATE");
  const LOT=SD.lotSF??6250;
  const baseDMax=Math.floor(LOT/(SD.densityPerSF??600));
  const sdbTiers=[5,10,15,20].map(p=>{const bonusPct=22.5+(p-5)*2.5;const bonusDU=Math.ceil(baseDMax*bonusPct/100);return{p,bonusDU,totalDU:baseDMax+bonusDU,affDU:Math.ceil(baseDMax*p/100),bonusPct};});
  const affordReq=Math.ceil(baseDMax*(SD.affordabilityPct??0.40));
  const mktU=Math.max(0,resiU-affordReq);
  const difPerUnit=SD.difPerUnit??15000;
  const nefTotal=Math.round((SD.nefRatePerSF??11.78)*LOT);

  return (
    <div style={{marginBottom:12}}>
      <div style={{padding:"11px 16px",background:"linear-gradient(90deg,#0f4c81,#1a365d)",color:"#fff",fontWeight:700,fontSize:13,borderRadius:"10px 10px 0 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span>PLANNING ADVISORY & REFERENCE GUIDE</span>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:10,opacity:.6,fontWeight:400}}>written for project stakeholders</span>
          <button onClick={toggleAll} style={{padding:"3px 10px",borderRadius:5,border:"1.5px solid rgba(255,255,255,.4)",background:"rgba(255,255,255,.1)",color:"#fff",fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{allOpen?"Collapse All":"Expand All"}</button>
        </div>
      </div>

      <div style={{background:"#f8fafc",padding:"10px",borderRadius:"0 0 10px 10px",border:"1px solid #e2e8f0",borderTop:"none"}}>

        <AdvCard id="overview" title="How This Checklist Works" isOpen={!!open["overview"]} onToggle={toggle}>
          <p>This checklist walks you through every step needed to prepare a pre-application for a mixed-use development at <AB>4335 Euclid Avenue</AB> in San Diego's City Heights neighborhood. Start at the <AB>Building Configuration</AB> above to define your project, then work through each category (A through F) below.</p>
          <p>The <span style={{display:"inline-flex",width:16,height:16,borderRadius:8,background:"#dbeafe",color:"#2563eb",fontSize:9,fontWeight:800,alignItems:"center",justifyContent:"center",verticalAlign:"middle"}}>?</span> buttons open detailed explanations. Items tagged <ATag color="#dc2626">ACTION</ATag> need to happen first. Dimmed items only apply if a specific choice is selected.</p>
        </AdvCard>

        <AdvCard id="far_density" title="FAR vs Density: How Commercial Counts Differently" isOpen={!!open["far_density"]} onToggle={toggle}>
          <p><AB>FAR (Floor Area Ratio)</AB> measures <AB>total building size</AB> relative to the lot. It counts EVERYTHING — commercial AND residential floor area combined.</p>
          <p style={{background:"#eff6ff",padding:"8px 12px",borderRadius:8,margin:"8px 0"}}><AB>Your FAR:</AB> <ANum>{(bldgs.reduce((s,b)=>s+b.w*b.d*b.stories,0)/LOT).toFixed(2)}</ANum> = {bldgs.reduce((s,b)=>s+b.w*b.d*b.stories,0).toLocaleString()} total SF / {LOT.toLocaleString()} lot SF</p>
          <p><AB>Density</AB> counts <AB>only residential dwelling units</AB>. Your 3 commercial suites are NOT dwelling units. So your density is <ANum>{resiU} DU</ANum>, not {resiU + bldgs.filter(b=>b.type==="Commercial").reduce((s,b)=>s+b.unitsPerFloor*b.stories,0)}.</p>
          <p><AB>Why this matters:</AB> Your FAR ({(bldgs.reduce((s,b)=>s+b.w*b.d*b.stories,0)/LOT).toFixed(2)}) fits under the base zone limit of {SD.baseFAR??2.0} — FAR is not the problem. But your <ANum>{resiU} residential units</ANum> exceeds the base zone cap of <ANum>{baseDMax} DU</ANum>. {resiU > baseDMax ? <AWarn> Density is the constraint that pushes you toward CCHS.</AWarn> : <AGood> Density fits within base zone.</AGood>}</p>
          <p style={{fontSize:11,color:"#94a3b8",marginTop:8}}>Think of it this way: FAR asks "how big is the building?" — Density asks "how many homes are inside?"</p>
        </AdvCard>

        <AdvCard id="dif" title={"DIF Savings: 720 SF vs 486 SF Units — ~$" + (mktU*difPerUnit).toLocaleString() + " Difference"} isOpen={!!open["dif"]} onToggle={toggle}>
          <p><AB>Development Impact Fees (DIF)</AB> are charged on every new dwelling unit to fund parks, roads, fire stations, and libraries. In City Heights, a typical multifamily unit costs roughly <ANum>$12,000-$18,000</ANum> in combined DIF.</p>

          <div style={{background:"#fef2f2",padding:"10px 14px",borderRadius:8,margin:"10px 0",border:"1px solid #fecaca"}}>
            <div style={{fontWeight:700,fontSize:12,color:"#991b1b",marginBottom:4}}>500 SF vs 750 SF -- Two Different Programs</div>
            <div style={{fontSize:12,lineHeight:1.6}}>
              <div style={{marginBottom:4}}><AB>500 SF</AB> = CCHS DIF waiver threshold. Applies to standard multifamily dwelling units in a CCHS project. SDMC Sec.143.1010(i)(3). <ARef n={1} onToggle={toggle}/></div>
              <div><AB>750 SF</AB> = ADU DIF exemption threshold. Applies ONLY to Accessory Dwelling Units per SB 13 / SDMC Sec.142.0640(b)(1)(a). <ARef n={2} onToggle={toggle}/> This does NOT apply to your project -- you are building standard multifamily units, not ADUs.</div>
            </div>
          </div>

          <p>Under CCHS, DIF is <AGood>waived entirely</AGood> for: (a) all units at or below 500 SF <ARef n={1} onToggle={toggle}/>, (b) all deed-restricted affordable units regardless of size, and (c) 3-bedroom affordable units at 150% AMI or below with one lease per unit.</p>

          <div style={{background:"#fef3c7",padding:"10px 14px",borderRadius:8,margin:"10px 0",border:"1px solid #fde68a"}}>
            <div style={{fontWeight:700,fontSize:12,marginBottom:6}}>Your current units: {unitSF} SF (18 x {resiB[0]?.d || 40})</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div>
                <div style={{fontWeight:700,fontSize:11,color:"#92400e"}}>Scenario A: Keep 720 SF</div>
                <div style={{fontSize:12}}>Affordable ({affordReq} units): <AGood>$0 DIF</AGood></div>
                <div style={{fontSize:12}}>Market-rate ({mktU} units): <AWarn>~${(mktU*difPerUnit).toLocaleString()}</AWarn></div>
                <div style={{fontSize:12,fontWeight:700,marginTop:4}}>Total DIF: ~${(mktU*difPerUnit).toLocaleString()}</div>
              </div>
              <div>
                <div style={{fontWeight:700,fontSize:11,color:"#166534"}}>Scenario B: Shrink to 486 SF (18x27)</div>
                <div style={{fontSize:12}}>ALL {resiU} units: <AGood>$0 DIF (under 500 SF!)</AGood></div>
                <div style={{fontSize:12,fontWeight:700,marginTop:4,color:"#16a34a"}}>Total DIF: $0</div>
                <div style={{fontSize:12,color:"#16a34a",fontWeight:700}}>Savings: ~${(mktU*difPerUnit).toLocaleString()}</div>
              </div>
            </div>
          </div>

          <p><AB>Can you actually do this?</AB> Yes — shrinking from 18x40 to 18x27 is an architectural decision. You lose 234 SF per unit but save roughly <ANum>${difPerUnit.toLocaleString()}</ANum> per market-rate unit. At 486 SF it's a tight studio or 1-bedroom, but this size is common in transit-oriented developments. Many CCHS projects in San Diego target just under 500 SF for exactly this reason.</p>

          <p><AB>Scenario C: 100% affordable</AB> — ALL DIF waived AND the <ANum>${nefTotal.toLocaleString()}</ANum> NEF is waived too. Total City fees: <AGood>$0</AGood>.</p>
        </AdvCard>

        <AdvCard id="sb330" title="SB 330: Locking In Your Rules" isOpen={!!open["sb330"]} onToggle={toggle}>
          <p><AB>What it does:</AB> When you file an SB 330 Preliminary Application, the development standards, fees, and policies in effect on <AB>that date</AB> are "frozen" — the City cannot apply new rules adopted after your filing.</p>
          <p><AB>Now permanent law:</AB> AB 130 (effective July 2025) removed the sunset. <ARef n={4} onToggle={toggle}/> SB 330 no longer expires.</p>
          <p><AB>Why file now?</AB> San Diego's Land Development Code is actively being updated. New CCHS amendments, fee increases, or rule changes could be adopted any time. Filing SB 330 locks in <AB>today's</AB> rules for 180 days while you prepare the full application.</p>
          <div style={{background:"#f0fdf4",padding:"8px 12px",borderRadius:8,margin:"8px 0"}}>
            <div style={{fontWeight:700,fontSize:11}}>What gets locked:</div>
            <div style={{fontSize:12}}>Zoning standards, DIF rates, parking (currently <AGood>0 required</AGood> in TPA), CCHS tiers, NEF rate</div>
            <div style={{fontWeight:700,fontSize:11,marginTop:6}}>What does NOT lock:</div>
            <div style={{fontSize:12}}>Annual auto-adjustments, building code health/safety changes, school fees</div>
          </div>
          <p><AB>Your project qualifies:</AB> {(bldgs.reduce((s,b)=>b.type==="Residential"?s+b.w*b.d*b.stories:s,0)/Math.max(1,bldgs.reduce((s,b)=>s+b.w*b.d*b.stories,0))*100).toFixed(0)}% residential (needs {"\u2265"}66.7%). <AB>Key rules:</AB> 180-day window to file full application, project can't change by {"\u2265"}20%, construction must start within 2.5 years of final approval.</p>
        </AdvCard>

        <AdvCard id="ab2097" title="AB 2097: Zero Parking Near Transit" isOpen={!!open["ab2097"]} onToggle={toggle}>
          <p><AB>What it does:</AB> State law (effective Jan 1, 2023, Gov. Code Sec.65863.2) <ARef n={5} onToggle={toggle}/> that <AB>prohibits cities from requiring minimum parking</AB> for any project within half a mile of a major transit stop. Applies to residential, commercial, and mixed-use.</p>
          <p><AB>For your site:</AB> You're already in a Transit Priority Area (TPA) where San Diego eliminated parking locally. AB 2097 gives you a <AB>second, independent state-law basis</AB> for zero parking — a backstop even if local rules change.</p>
          <p><AB>Practical impact on a 50x125 lot:</AB> A single parking space with aisle is ~180 SF. Even 6 spaces would consume most of the ground floor behind the commercial zone. Zero parking isn't just legal — it's almost a spatial necessity on this lot.</p>
          <p style={{fontSize:11,color:"#94a3b8"}}>If you voluntarily provide ANY parking, it must include EV charging spaces and ADA accessible spaces. The city may also require car-share spaces.</p>
        </AdvCard>

        <AdvCard id="sb9" title="SB 9: Not for This Site (But Know It for Clients)" isOpen={!!open["sb9"]} onToggle={toggle}>
          <p><AB>What it does:</AB> Allows up to 4 units on a <AB>single-family zoned lot</AB> <ARef n={6} onToggle={toggle}/> (split the lot into 2, build a duplex on each), ministerially -- no hearing, no CEQA.</p>
          <p><AWarn>Does NOT apply here.</AWarn> Your site is zoned CUPD-CU-2-4 (commercial/mixed-use). SB 9 only works on single-family residential zones (RS-1-7, RS-1-14, etc.).</p>
          <p><AB>When to use for your clients:</AB> Homeowner with a standard single-family lot wants to add units. SB 9 lets them build up to 4 total across two resulting parcels with no public hearing. Very powerful for infill in residential neighborhoods.</p>
        </AdvCard>

        <AdvCard id="densitybonus" title="State Density Bonus vs CCHS — Side-by-Side" isOpen={!!open["densitybonus"]} onToggle={toggle}>
          <p><AB>State Density Bonus</AB> (Gov. Code Sec.65915) <ARef n={8} onToggle={toggle}/> is a separate program from CCHS. You can use either, or stack both.</p>
          <div style={{overflowX:"auto",margin:"10px 0"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
              <thead><tr style={{background:"#f1f5f9"}}>
                <th style={{padding:"6px 8px",textAlign:"left",borderBottom:"2px solid #e2e8f0",fontSize:10}}>Factor</th>
                <th style={{padding:"6px 8px",textAlign:"left",borderBottom:"2px solid #e2e8f0",fontSize:10,color:"#7c3aed"}}>CCHS Tier 3</th>
                <th style={{padding:"6px 8px",textAlign:"left",borderBottom:"2px solid #e2e8f0",fontSize:10,color:"#2563eb"}}>State Density Bonus</th>
              </tr></thead>
              <tbody>
                {[
                  ["Max FAR","6.5","2.0 (incentive to increase)"],
                  ["Max density","Unlimited",`${Math.ceil(baseDMax*1.2)} DU (20% bonus from ${baseDMax})`],
                  ["Affordable units required",`${affordReq} (40% of ${baseDMax} base)`,"1 unit (5% VLI for 20% bonus)"],
                  ["NEF fee","~$73,625","$0 (not applicable)"],
                  ["DIF waiver","Yes: affordable + <=500 SF","No general waiver"],
                  ["Height","No limit <95 ft","45 ft (unless incentive)"],
                  ["Parking","0 (TPA + AB 2097)","Reduced (0.5/unit near transit)"],
                  ["Process","Ministerial, 30-day review","Ministerial if conforming"],
                  ["Growth potential",`Massive (${((SD.commFAR??6.5)*LOT).toLocaleString()} SF)`,`Limited (${((SD.baseFAR??2.0)*LOT).toLocaleString()} SF base)`],
                ].map(([f,c,d],i)=>(
                  <tr key={i} style={{borderBottom:"1px solid #f1f5f9"}}>
                    <td style={{padding:"5px 8px",fontWeight:600}}>{f}</td>
                    <td style={{padding:"5px 8px"}}>{c}</td>
                    <td style={{padding:"5px 8px"}}>{d}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <p><AB>For your {resiU}-unit project:</AB> State Density Bonus requires only <ANum>{sdbTiers[0].affDU} affordable unit</ANum> (vs {Math.ceil(baseDMax*(SD.affordabilityPct??0.40))} under CCHS) and no NEF. But CCHS gives unlimited density headroom, faster review (30 days), and DIF waivers. Choose SDB to <AB>minimize affordability obligation</AB>; choose CCHS to <AB>maximize the site</AB>.</p>
          <div style={{background:"#ecfeff",border:"1px solid #a5f3fc",borderRadius:8,padding:"10px 14px",margin:"10px 0"}}>
            <div style={{fontWeight:700,fontSize:11,color:"#0e7490",marginBottom:6}}>SDB Tier Calculator — {resiU} proposed DU on {baseDMax} DU base</div>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
              <thead><tr style={{background:"#cffafe"}}>
                {["Afford. DU","% Base","Income","Bonus %","+Units","Total"].map(h=><th key={h} style={{padding:"4px 6px",textAlign:"left",fontSize:10,fontWeight:700}}>{h}</th>)}
              </tr></thead>
              <tbody>
                {sdbTiers.map((t,i)=>(
                  <tr key={i} style={{borderBottom:"1px solid #e0f2fe",background:t.totalDU>=resiU?"#f0fdf4":"#fff"}}>
                    <td style={{padding:"4px 6px",fontWeight:t.totalDU>=resiU?700:400}}>{t.affDU} unit{t.affDU!==1?"s":""}</td>
                    <td style={{padding:"4px 6px"}}>{t.p}%</td>
                    <td style={{padding:"4px 6px",color:"#64748b"}}>LI/VLI</td>
                    <td style={{padding:"4px 6px"}}>{t.bonusPct}%</td>
                    <td style={{padding:"4px 6px",color:"#16a34a",fontWeight:700}}>+{t.bonusDU}</td>
                    <td style={{padding:"4px 6px",fontWeight:700,color:t.totalDU>=resiU?"#16a34a":"#1e293b"}}>{t.totalDU} DU {t.totalDU>=resiU?"\u2713":""}</td>
                  </tr>
                ))}
              </tbody>
            </table>
            <div style={{fontSize:10,color:"#0e7490",marginTop:6}}>GC §65915. FAR stays at 2.0 (12,500 SF). No NEF. DIF applies (no waiver). Height 45 ft unless waiver requested.</div>
          </div>
          <p><AB>Can you stack them?</AB> <AGood>Yes.</AGood> CCHS projects can also apply SDB on top — bonus calculated from CCHS-allowed base, not the original zone. Maximum density strategy for this lot.</p>
        </AdvCard>

        <AdvCard id="commercial" title="The Front 30 Feet: Commercial Requirement" isOpen={!!open["commercial"]} onToggle={toggle}>
          <p>CUPD-CU-2-4 says: <AB>"Residential is only permitted when commercial occupies the front 30 feet of the lot."</AB> <ARef n={9} onToggle={toggle}/></p>
          <p>This 30 feet is measured from the <AB>front property line</AB> along Euclid Avenue. After subtracting your 10-foot front setback, you have <ANum>20 feet of actual commercial building depth</ANum> at ground level.</p>
          <p>Your 18-foot-deep commercial building fits within this 20-foot zone. The remaining 2 feet acts as a buffer or can accommodate wall thickness.</p>
          <p><AB>Important:</AB> The commercial space must be <AB>genuinely commercial</AB> — retail, office, restaurant, services. It cannot be storage, a residential lobby that passes through, or an unused shell. The rule ensures Euclid Avenue maintains an active street-level commercial character.</p>
          <p>Residential is allowed: (1) behind the 30-foot line at ground level, and (2) on all upper floors throughout the building, including directly above the commercial space.</p>
        </AdvCard>


        <AdvCard id="glossary" title="Glossary" isOpen={!!open["glossary"]} onToggle={toggle}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:"6px 14px"}}>
            {GLOSSARY.map(g=>(
              <div key={g.term} style={{padding:"7px 10px",borderRadius:8,background:"#f8fafc",border:"1px solid #e2e8f0"}}>
                <div style={{display:"flex",gap:6,alignItems:"baseline",marginBottom:3}}>
                  <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:700,color:"#0f4c81",flexShrink:0}}>{g.term}</span>
                  {g.full&&<span style={{fontSize:9,color:"#64748b",fontWeight:600}}>{g.full}</span>}
                </div>
                <div style={{fontSize:11,color:"#475569",lineHeight:1.5}}>{g.def}</div>
              </div>
            ))}
          </div>
        </AdvCard>

        <div style={{marginTop:8,borderRadius:10,border:"1px solid #e2e8f0",background:"#fff",overflow:"clip"}}>
          <button onClick={e=>{e.currentTarget.blur();toggle("footnotes")}} style={{width:"100%",padding:"10px 14px",border:"none",cursor:"pointer",fontFamily:"inherit",background:open["footnotes"]?"#f8fafc":"#fff",display:"flex",justifyContent:"space-between",alignItems:"center",textAlign:"left"}}>
            <span style={{fontSize:13,fontWeight:700,color:"#1e293b"}}>Sources and References</span>
            <span style={{fontSize:12,color:"#94a3b8",transition:"transform .2s",transform:open["footnotes"]?"rotate(0)":"rotate(-90deg)",display:"inline-block"}}>{"\u25BE"}</span>
          </button>
          {open["footnotes"]&&<div style={{padding:"0 14px 14px",fontSize:11,lineHeight:1.8,color:"#64748b"}}>
            <div data-fn="1">[1] SDMC Sec.143.1010(i)(3): DIF waiver for units not exceeding 500 SF. This is specific to CCHS projects.<br/>
              <a href="https://docs.sandiego.gov/municode/MuniCodeChapter14/Ch14Art03Division10.pdf" target="_blank" rel="noopener" style={{color:"#2563eb",wordBreak:"break-all"}}>docs.sandiego.gov/municode/MuniCodeChapter14/Ch14Art03Division10.pdf</a></div>
            <div data-fn="2" style={{marginTop:6}}>[2] The 750 SF DIF exemption applies ONLY to Accessory Dwelling Units (ADUs) per SDMC Sec.142.0640(b)(1)(a) and SB 13. Standard multifamily units in CCHS projects use the 500 SF threshold -- these are two separate programs.<br/>
              <a href="https://www.sandiego.gov/planning/work/public-spaces/faq" target="_blank" rel="noopener" style={{color:"#2563eb",wordBreak:"break-all"}}>sandiego.gov/planning/work/public-spaces/faq</a></div>
            <div data-fn="3" style={{marginTop:6}}>[3] FY2026 Fee Schedule: NEF = $11.78/SF (under 95 ft) / $14.42/SF (over 95 ft). Base rate was $9.00/SF with annual increases per Resolution R-313282.<br/>
              <a href="https://www.sandiego.gov/sites/default/files/feeschedule.pdf" target="_blank" rel="noopener" style={{color:"#2563eb",wordBreak:"break-all"}}>sandiego.gov/sites/default/files/feeschedule.pdf</a></div>
            <div data-fn="4" style={{marginTop:6}}>[4] AB 130 (2025): Removed SB 330 sunset, making Housing Crisis Act permanent. Prior: SB 8 (2021) extended to Jan 1, 2030.<br/>
              <a href="https://www.encinitasca.gov/government/departments/development-services/policy-planning-housing/policy-planning/sb-330-housing-crisis-act" target="_blank" rel="noopener" style={{color:"#2563eb",wordBreak:"break-all"}}>encinitasca.gov/.../sb-330-housing-crisis-act</a></div>
            <div data-fn="5" style={{marginTop:6}}>[5] AB 2097 (2022): Gov. Code Sec.65863.2. Prohibits minimum parking within 1/2 mile of major transit stop.<br/>
              <a href="https://www.hcd.ca.gov/sites/default/files/docs/policy-and-research/ab-2097-ta.pdf" target="_blank" rel="noopener" style={{color:"#2563eb",wordBreak:"break-all"}}>hcd.ca.gov/.../ab-2097-ta.pdf</a> (HCD Technical Advisory)</div>
            <div data-fn="6" style={{marginTop:6}}>[6] SB 9 (2021): Gov. Code Sec.65852.21. Multi-dwelling unit development on single-family parcels.<br/>
              <a href="https://www.sandiego.gov/development-services/forms-publications/information-bulletins/409" target="_blank" rel="noopener" style={{color:"#2563eb",wordBreak:"break-all"}}>sandiego.gov/.../information-bulletins/409</a> (San Diego IB-409)</div>
            <div data-fn="7" style={{marginTop:6}}>[7] CCHS FAR Tier 3 = 6.5. SDMC Sec.143.1010(d), Table 143-10A. SDA eligibility confirmed via ZAPP map.<br/>
              <a href="https://docs.sandiego.gov/municode/MuniCodeChapter14/Ch14Art03Division10.pdf" target="_blank" rel="noopener" style={{color:"#2563eb",wordBreak:"break-all"}}>docs.sandiego.gov/municode/.../Ch14Art03Division10.pdf</a> (SDMC) &nbsp;|&nbsp;
              <a href="https://www.sandiego.gov/sites/default/files/ib-411_complete_communities_housing_solutions.pdf" target="_blank" rel="noopener" style={{color:"#2563eb",wordBreak:"break-all"}}>sandiego.gov/.../ib-411_complete_communities_housing_solutions.pdf</a> (IB-411)</div>
            <div data-fn="8" style={{marginTop:6}}>[8] State Density Bonus Law: Gov. Code Sec.65915 et seq. San Diego implementation: SDMC Sec.143.0720.<br/>
              <a href="https://www.sandiego.gov/development-services/regulatory-updates" target="_blank" rel="noopener" style={{color:"#2563eb",wordBreak:"break-all"}}>sandiego.gov/development-services/regulatory-updates</a></div>
            <div data-fn="9" style={{marginTop:6}}>[9] CUPD-CU-2-4 commercial frontage: SDMC Ch.15, Art.5, Div.2, Sec.155.0240, Table 155-02D.<br/>
              <a href="https://docs.sandiego.gov/municode/MuniCodeChapter15/Ch15Art05Division02.pdf" target="_blank" rel="noopener" style={{color:"#2563eb",wordBreak:"break-all"}}>docs.sandiego.gov/municode/.../Ch15Art05Division02.pdf</a></div>
            <div style={{marginTop:10,padding:"8px 12px",borderRadius:8,background:"#fef3c7",border:"1px solid #fde68a",fontSize:10}}>
              <b>Important:</b> Fee amounts are based on the FY2026 fee schedule and may be adjusted annually. Always verify current rates with DSD at time of application. DIF amounts are estimates based on typical Mid-City multifamily rates; use the City's DIF Calculator with your APN for exact figures.
            </div>
          </div>}
        </div>

      </div>
    </div>
  );
}

function ChoiceUI({id,sel,onSel,onHelp}){
  const cfg=CHOICES[id];if(!cfg||cfg.type==="dim")return null;
  const v=sel[cfg.key];const hb=cfg.key?<HelpIcon k={cfg.key} onOpen={onHelp}/>:null;
  if(cfg.type==="buttons") return (
    <div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:6,alignItems:"center"}}>
      <span style={{fontSize:9,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:.6,marginRight:1}}>{cfg.label}:</span>{hb}
      {cfg.options.map(o=><Pill key={o} label={o} active={v===o} onClick={()=>onSel(cfg.key,v===o?null:o)} small/>)}
    </div>
  );
  if(cfg.type==="buttons_input"){const isO=v&&!cfg.options.includes(v);return (
    <div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:6,alignItems:"center"}}>
      <span style={{fontSize:9,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:.6}}>{cfg.label}:</span>{hb}
      {cfg.options.map(o=><Pill key={o} label={o} active={v===o} onClick={()=>onSel(cfg.key,v===o?null:o)} small/>)}
      <Pill label="Other" active={isO} onClick={()=>onSel(cfg.key,isO?null:" ")} color="#7c3aed" small/>
      {isO&&<input type="text" placeholder={cfg.otherLabel} value={(v||"").trim()} onClick={e=>e.stopPropagation()} onChange={e=>{e.stopPropagation();onSel(cfg.key,e.target.value||" ")}} style={{padding:"4px 8px",borderRadius:6,border:"1.5px solid #a78bfa",fontSize:11,fontFamily:"inherit",width:130,outline:"none",background:"#faf5ff"}}/>}
    </div>
  )}
  if(cfg.type==="yesno") return (
    <div style={{display:"flex",gap:5,marginTop:6,alignItems:"center"}}>
      <span style={{fontSize:9,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:.6}}>{cfg.label}</span>{hb}
      <Pill label="Yes" active={v==="yes"} onClick={()=>onSel(cfg.key,v==="yes"?null:"yes")} color="#dc2626" small/>
      <Pill label="No" active={v==="no"} onClick={()=>onSel(cfg.key,v==="no"?null:"no")} color="#16a34a" small/>
      <Pill label="TBD" active={v==="tbd"} onClick={()=>onSel(cfg.key,v==="tbd"?null:"tbd")} color="#d97706" small/>
    </div>
  );
  if(cfg.type==="input") return (
    <div style={{display:"flex",gap:5,marginTop:6,alignItems:"center"}}>
      <span style={{fontSize:9,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:.6}}>{cfg.label}:</span>{hb}
      <input type="text" placeholder={cfg.placeholder} value={v||""} onClick={e=>e.stopPropagation()} onChange={e=>{e.stopPropagation();onSel(cfg.key,e.target.value)}} style={{padding:"4px 8px",borderRadius:6,border:"1.5px solid #94a3b8",fontSize:11,fontFamily:"'JetBrains Mono',monospace",width:120,outline:"none"}}/>
      {cfg.suffix&&<span style={{fontSize:10,color:"#64748b",fontWeight:600}}>{cfg.suffix}</span>}
    </div>
  );
  return null;
}

function ItemRow({it,isDone,toggleCheck,sel,onSel,userNote,setNote,noteOpen,toggleNote,onHelp}){
  const cfg=CHOICES[it.id];
  const isDimmed=cfg&&cfg.type==="dim"&&cfg.dimIf&&cfg.dimIf(sel);
  return (
    <div style={{borderBottom:"1px solid #e2e8f0",background:isDimmed?"#f8f9fb":it.alert&&!isDone?"#fff5f5":isDone?"#f0fdf4":"#fff",opacity:isDimmed?.45:1,transition:"all .15s"}}>
      <div style={{display:"flex",gap:10,padding:"8px 14px",alignItems:"flex-start"}}>
        <input type="checkbox" checked={!!isDone} onChange={()=>toggleCheck(it.id)} style={{marginTop:3,width:16,height:16,accentColor:"#0f4c81",flexShrink:0,cursor:"pointer"}}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",gap:6,alignItems:"baseline",flexWrap:"wrap"}}>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,color:isDone?"#15803d":it.alert?"#dc2626":"#64748b",flexShrink:0}}>{it.id}</span>
            <span style={{fontSize:12,fontWeight:500,color:isDone?"#166534":"#1e293b"}}>{it.text}</span>
          </div>
          {it.note&&<div style={{fontSize:10,color:"#94a3b8",marginTop:1}}>{it.note}</div>}
          <ChoiceUI id={it.id} sel={sel} onSel={onSel} onHelp={onHelp}/>
          <div style={{marginTop:3}}>
            <button onClick={()=>toggleNote(it.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:9,color:"#94a3b8",fontFamily:"inherit",padding:0,textDecoration:"underline"}}>{noteOpen?"hide":userNote?"edit note":"+ note"}</button>
            {userNote&&!noteOpen&&<span style={{fontSize:9,color:"#64748b",marginLeft:6,fontStyle:"italic"}}>"{userNote.length>40?userNote.slice(0,40)+"...":userNote}"</span>}
          </div>
          {noteOpen&&<textarea value={userNote||""} onChange={e=>setNote(it.id,e.target.value)} onClick={e=>e.stopPropagation()} placeholder="Your notes..." style={{marginTop:3,width:"100%",minHeight:32,padding:"5px 8px",borderRadius:6,border:"1.5px solid #e2e8f0",fontSize:11,fontFamily:"inherit",resize:"vertical",outline:"none",background:"#fafbfc",boxSizing:"border-box"}}/>}
        </div>
        <div style={{display:"flex",gap:3,flexShrink:0,alignItems:"center",marginTop:2}}>
          {it.alert&&!isDone&&<span style={{fontSize:7,fontWeight:700,background:"#fef2f2",color:"#dc2626",padding:"2px 6px",borderRadius:8,border:"1px solid #fecaca"}}>ACTION</span>}
          {isDimmed&&cfg&&cfg.dimLabel&&<span style={{fontSize:7,fontWeight:700,background:"#f5f3ff",color:"#7c3aed",padding:"2px 5px",borderRadius:6,border:"1px solid #ddd6fe"}}>{cfg.dimLabel}</span>}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════
//  MAIN APP
// ═══════════════════════════════════════
function App(){
  const isMobile=useMobile();
  const [ck,setCk]=useState({});const [sel,setSel]=useState({});const [notes,setNotes]=useState({});
  const [noteOpen,setNoteOpen]=useState({});const [collapsed,setCollapsed]=useState({});
  const [bldgs,setBldgs]=useState(DEFAULT_BLDGS);const [mapLocked,setMapLocked]=useState(false);const [filter,setFilter]=useState("all");
  const [loaded,setLoaded]=useState(false);const [copied,setCopied]=useState(null);const [helpOpen,setHelpOpen]=useState(null);const [helpData,setHelpData]=useState(null);
  const [saveFlash,setSaveFlash]=useState(false);const sfTimer=useRef(null);
  const openHelp=useCallback((k,d=null)=>{setHelpOpen(k);setHelpData(d);},[]);
  const closeHelp=()=>{setHelpOpen(null);setHelpData(null);};

  useEffect(()=>{(()=>{try{const r=localStorage.getItem(SK);if(r){const d=JSON.parse(r);if(d.ck)setCk(d.ck);if(d.sel)setSel(d.sel);if(d.notes)setNotes(d.notes);if(d.bldgs)setBldgs(d.bldgs);if(d.mapLocked!=null)setMapLocked(d.mapLocked);}else{const s=seedFromMap();if(s){setBldgs(s);setMapLocked(true);}}}catch(e){}setLoaded(true)})();},[]);
  const save=useCallback((c,s,n,b,ml)=>{try{localStorage.setItem(SK,JSON.stringify({ck:c,sel:s,notes:n,bldgs:b,mapLocked:ml}))}catch(e){}pushBackup(c,s,n,b,ml);setSaveFlash(true);if(sfTimer.current)clearTimeout(sfTimer.current);sfTimer.current=setTimeout(()=>setSaveFlash(false),2000);},[pushBackup]);
  const toggleCheck=id=>{const n={...ck,[id]:!ck[id]};setCk(n);save(n,sel,notes,bldgs,mapLocked)};
  const onSel=(k,v)=>{const n={...sel,[k]:v};if(k==="pathway"&&v&&v.includes("STATE"))n.sideSetback="0 FT (zero lot line)";setSel(n);save(ck,n,notes,bldgs,mapLocked)};
  const setNote=(id,v)=>{const n={...notes,[id]:v};setNotes(n);save(ck,sel,n,bldgs,mapLocked)};
  const setBldgsS=b=>{setBldgs(b);save(ck,sel,notes,b,mapLocked)};
  const toggleMapLock=()=>{if(mapLocked){setMapLocked(false);save(ck,sel,notes,bldgs,false);}else{const s=seedFromMap();const b=s||bldgs;setBldgs(b);setMapLocked(true);save(ck,sel,notes,b,true);}};
  const refreshFromMap=()=>{try{const r=localStorage.getItem(SK);if(r){const d=JSON.parse(r);delete d.bldgs;delete d.mapLocked;localStorage.setItem(SK,JSON.stringify(d));}}catch(e){}location.reload();};
  const toggleNote=id=>setNoteOpen(p=>({...p,[id]:!p[id]}));
  const toggleCat=id=>setCollapsed(p=>({...p,[id]:!p[id]}));

  const ai=allItemsOf(DATA);
  const matchF=it=>{if(filter==="all")return true;if(filter==="pending")return !ck[it.id];if(filter==="done")return !!ck[it.id];if(filter==="alert")return !!it.alert;return true};
  const total=ai.length,done=ai.filter(i=>ck[i.id]).length,pct=total?Math.round(done/total*100):0;
  const catSt=cat=>{let items=[];if(cat.items)items=cat.items;if(cat.sections)cat.sections.forEach(s=>items.push(...s.items));const t=items.length,d=items.filter(i=>ck[i.id]).length;return{total:t,done:d,pct:t?Math.round(d/t*100):0}};
  const resetAll=()=>{if(confirm("Clear ALL progress?")){const s=seedFromMap();const b=s||DEFAULT_BLDGS;const ml=!!s;setCk({});setSel({});setNotes({});setNoteOpen({});setBldgs(b);setMapLocked(ml);save({},{},{},b,ml)}};
  const pushBackup=useCallback((c,s,n,b,ml)=>{if(location.hostname!=="localhost"&&location.hostname!=="127.0.0.1")return;try{const d={project:SD.project||"ProjectBook-Planner",address:SD.address||"",exportedAt:new Date().toISOString(),progress:{done:Object.values(c).filter(Boolean).length,total:allItemsOf(DATA).length},checklist:c,selections:s,notes:n,buildings:b,mapLocked:ml};fetch("/backup-checklist",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)}).catch(()=>{});}catch(e){}},[]);
  const printPDF=()=>window.print();
  const downloadConfig=()=>{save(ck,sel,notes,bldgs,mapLocked);let mapState={};try{const r=localStorage.getItem("site_state");if(r)mapState=JSON.parse(r);}catch(e){}const siteKey={};["address","apn","zoning","lotWidth","lotDepth","lotSF","commercialDepth","baseFAR","commFAR","maxHeight","baseHeightLimit","cchsMaxHeight","frontSetback","rearSetback","sideSetback","densityPerSF","nefRatePerSF","affordabilityPct","difPerUnit","difWaiverSF","inspectors"].forEach(k=>{if(SD[k]!=null)siteKey[k]=SD[k]});const merged={project:SD.project||"ProjectBook-Planner",site:siteKey,saved:mapState.saved||{},checklist:{ck,sel,notes,bldgs,mapLocked,progress:{done:Object.values(ck).filter(Boolean).length,total:allItemsOf(DATA).length}}};const blob=new Blob([JSON.stringify(merged,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="site-data.json";a.click();URL.revokeObjectURL(a.href);setSaveFlash(true);if(sfTimer.current)clearTimeout(sfTimer.current);sfTimer.current=setTimeout(()=>setSaveFlash(false),2000);};
  const copyText=t=>{navigator.clipboard.writeText(t).then(()=>{setCopied(t);setTimeout(()=>setCopied(null),1500)}).catch(()=>{})};

  if(!loaded)return <div style={{padding:60,textAlign:"center",fontFamily:"'DM Sans',sans-serif",color:"#94a3b8"}}>Loading...</div>;

  const pw=sel.pathway;const hl=sel.hauler;const ml=sel.mailMode;const ss=sel.sideSetback;
  const renderItems=items=>items.filter(matchF).map(it=>
    <ItemRow key={it.id} it={it} isDone={ck[it.id]} toggleCheck={toggleCheck} sel={sel} onSel={onSel} userNote={notes[it.id]} setNote={setNote} noteOpen={!!noteOpen[it.id]} toggleNote={toggleNote} onHelp={openHelp}/>
  );

  return (
    <div style={{fontFamily:"'DM Sans','Segoe UI',system-ui,sans-serif",background:"#eef1f6",minHeight:"100vh",color:"#1e293b"}}>
      {helpOpen&&<HelpModal helpKey={helpOpen} helpData={helpData} onClose={closeHelp}/>}

      {/* HEADER */}
      <div style={{background:"linear-gradient(135deg,#0c3d6b,#162c46)",padding:"18px 24px 12px",color:"#fff",borderBottom:"3px solid #f59e0b"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10,maxWidth:920,margin:"0 auto"}}>
          <div>
            <div style={{fontSize:21,fontWeight:700,color:"#93c5fd"}}>Pre-Application Permit Checklist</div>
            <div style={{fontSize:11,opacity:.5,marginTop:2}}>{(function(){var a=(SD.address||'').split(',');if(a.length>=3){return a[1].trim()+', '+a[2].trim().split(' ')[0]}return a[1]?a[1].trim():'San Diego, CA'})()} Development Guide Book</div>
            <div id="ck-addr-wrap" style={{fontSize:16,fontWeight:700,marginTop:8,cursor:"pointer"}} onClick={e=>{var s=document.getElementById('ck-site-sel');if(s&&!s.disabled){s.style.display=s.style.display==='block'?'none':'block';}}}>
              {(SD.address||'4335 Euclid Avenue, San Diego, CA 92105')} <span id="ck-addr-arrow" style={{fontSize:10,opacity:.4}}>{"\u25BE"}</span>
            </div>
            <select id="ck-site-sel" style={{display:"none",width:"100%",background:"#0c2d4a",color:"#fff",border:"1px solid rgba(255,255,255,.3)",borderRadius:4,padding:"6px 8px",fontSize:12,fontWeight:600,fontFamily:"inherit",cursor:"pointer",zIndex:100,marginTop:4}} onChange={e=>{if(e.target.value){fetch('/api/sites/'+e.target.value+'/activate',{method:'POST'}).then(()=>{localStorage.removeItem('site_state');location.reload()})}}}></select>
            <div style={{fontSize:10,opacity:.5,marginTop:1,fontFamily:"'JetBrains Mono',monospace"}}>{SD.apn??'471-271-16-00'} {"\u2022"} {SD.zoning??'CUPD-CU-2-4'} {"\u2022"} {SD.lotWidth??50}x{SD.lotDepth??125} {"\u2022"} {(SD.lotSF??6250).toLocaleString()} SF</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:38,fontWeight:700,lineHeight:1,fontFamily:"'JetBrains Mono',monospace",color:pct===100?"#4ade80":pct>60?"#38bdf8":"#fbbf24"}}>{pct}<span style={{fontSize:14,opacity:.7}}>%</span></div>
            <div style={{fontSize:9,opacity:.4}}>{done}/{total}</div>
          </div>
        </div>
        <div style={{maxWidth:920,margin:"10px auto 0"}}>
          <div style={{background:"rgba(255,255,255,.08)",borderRadius:5,height:7,overflow:"hidden"}}>
            <div style={{width:`${pct}%`,height:"100%",borderRadius:5,background:pct===100?"#22c55e":pct>60?"#38bdf8":"#fbbf24",transition:"width .4s"}}/>
          </div>
          {(pw||hl||ml||ss)&&<div style={{display:"flex",gap:5,marginTop:8,flexWrap:"wrap"}}>
            {pw&&<span style={{fontSize:9,fontWeight:700,background:pw.includes("CCHS")?"#7c3aed":"#2563eb",padding:"2px 10px",borderRadius:12}}>{pw.includes("CCHS")?"CCHS 6.5":"BASE 2.0"}</span>}
            {ss&&<span style={{fontSize:9,fontWeight:700,background:"#475569",padding:"2px 10px",borderRadius:12}}>Side: {ss.split(" ")[0]}</span>}
            {hl&&<span style={{fontSize:9,fontWeight:700,background:"#0d9488",padding:"2px 10px",borderRadius:12}}>{(hl||"").trim()}</span>}
            {ml&&<span style={{fontSize:9,fontWeight:700,background:"#b45309",padding:"2px 10px",borderRadius:12}}>{ml.split(" ")[0]}</span>}
          </div>}
          <div style={{display:"flex",gap:5,marginTop:8,flexWrap:"wrap"}}>
            {[{k:"all",l:"All"},{k:"pending",l:"Pending"},{k:"done",l:"Done"},{k:"alert",l:"Critical"}].map(f=>
              <button key={f.k} onClick={()=>setFilter(f.k)} style={{padding:"3px 12px",borderRadius:16,border:"1px solid rgba(255,255,255,.2)",background:filter===f.k?"rgba(255,255,255,.15)":"transparent",color:"#fff",fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{f.l}</button>
            )}
            <button onClick={resetAll} style={{marginLeft:"auto",padding:"3px 12px",borderRadius:16,border:"1px solid rgba(255,100,100,.3)",background:"transparent",color:"#fca5a5",fontSize:9,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Reset</button>
          </div>
        </div>
      </div>

      {/* BODY */}
      <div style={{padding:"14px 18px 50px",maxWidth:920,margin:"0 auto"}}>
        <BuildingConfig bldgs={bldgs} setBldgs={setBldgsS} sel={sel} onSel={onSel} onHelp={openHelp} mapLocked={mapLocked} onToggleLock={toggleMapLock} onRefresh={refreshFromMap} isMobile={isMobile}/>
        <AdvisorySection sel={sel} bldgs={bldgs} onHelp={openHelp}/>

        {DATA.map(cat=>{
          const st=catSt(cat);const open=!collapsed[cat.id];
          const hasVis=(()=>{let items=[];if(cat.items)items=cat.items;if(cat.sections)cat.sections.forEach(s=>items.push(...s.items));return items.some(matchF)})();
          if(!hasVis&&filter!=="all")return null;
          return (
            <div key={cat.id} style={{marginBottom:8,borderRadius:10,overflow:"clip",border:"1px solid #d1d5db",background:"#fff",boxShadow:"0 1px 2px rgba(0,0,0,.03)"}}>
              <button onClick={e=>{e.currentTarget.blur();toggleCat(cat.id)}} style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 14px",border:"none",cursor:"pointer",fontFamily:"inherit",background:st.pct===100?"linear-gradient(90deg,#166534,#15803d)":"linear-gradient(90deg,#0f4c81,#1e3a5f)",color:"#fff",textAlign:"left"}}>
                <span style={{fontWeight:700,fontSize:12}}>{cat.title}</span>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  {st.pct===100&&<span style={{fontSize:12}}>&#10003;</span>}
                  <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,background:"rgba(255,255,255,.14)",padding:"2px 8px",borderRadius:10}}>{st.done}/{st.total}</span>
                  <span style={{fontSize:12,transition:"transform .2s",transform:open?"rotate(0)":"rotate(-90deg)",display:"inline-block"}}>&#9662;</span>
                </div>
              </button>
              <div style={{height:3,background:"#e5e7eb"}}><div style={{width:`${st.pct}%`,height:3,background:st.pct===100?"#22c55e":"#3b82f6",transition:"width .3s"}}/></div>
              {open&&<div>
                {cat.items&&renderItems(cat.items)}
                {cat.sections&&cat.sections.map((sec,si)=>{
                  const sv=sec.items.filter(matchF);if(!sv.length)return null;
                  return <div key={si}>
                    <div style={{padding:"4px 14px",background:"#f1f5f9",fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:.8,color:"#475569",borderBottom:"1px solid #e2e8f0"}}>{sec.sub}</div>
                    {renderItems(sec.items)}
                  </div>
                })}
              </div>}
            </div>
          );
        })}

        <div style={{marginTop:12,borderRadius:10,overflow:"clip",border:"1px solid #d1d5db",background:"#fff"}}>
          <div style={{padding:"9px 14px",background:"#334155",color:"#fff",fontWeight:700,fontSize:12}}>G. KEY CONTACTS</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))"}}>
            {CONTACTS.map((c,i)=><div key={i} style={{padding:"8px 14px",borderBottom:"1px solid #f1f5f9",borderRight:"1px solid #f1f5f9",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:8,fontWeight:700,textTransform:"uppercase",color:"#94a3b8",letterSpacing:.5}}>{c.name}</div>
                <div style={{fontSize:11,fontWeight:500,color:"#1e293b",marginTop:1,wordBreak:"break-all"}}>{c.val}</div>
              </div>
              {c.copy&&<button onClick={()=>copyText(c.val)} style={{background:copied===c.val?"#22c55e":"#e2e8f0",border:"none",borderRadius:5,padding:"3px 8px",fontSize:9,fontWeight:600,cursor:"pointer",fontFamily:"inherit",color:copied===c.val?"#fff":"#475569",transition:"all .15s",flexShrink:0}}>{copied===c.val?"Copied!":"Copy"}</button>}
            </div>)}
          </div>
        </div>
        <div style={{textAlign:"center",marginTop:20,fontSize:9,color:"#94a3b8",lineHeight:1.8}}>
          All data persists in browser localStorage {"\u2022"} 4335 Euclid Ave {"\u2022"} v6.3
        </div>
      </div>

      {/* FLOATING FAB */}
      <div id="fab-float" style={{position:"fixed",bottom:24,right:24,zIndex:9998,display:"flex",flexDirection:"column",alignItems:"flex-end",gap:8,pointerEvents:"none"}}>
        {saveFlash&&(
          <div style={{pointerEvents:"none",background:"#166534",color:"#dcfce7",padding:"6px 14px",borderRadius:20,fontSize:11,fontWeight:700,boxShadow:"0 4px 16px rgba(0,0,0,.25)",display:"flex",alignItems:"center",gap:5,animation:"fadeInUp .2s ease",whiteSpace:"nowrap"}}>
            <span style={{fontSize:13}}>&#10003;</span> Auto-saved
          </div>
        )}
        <button onClick={downloadConfig} title="Downloads preapp-checklist.json to your Downloads folder. Move it back to this same folder to keep your work synced." style={{pointerEvents:"all",background:"#475569",color:"#fff",border:"none",borderRadius:20,padding:"8px 18px",fontSize:12,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 16px rgba(0,0,0,.3)",display:"flex",alignItems:"center",justifyContent:"center",gap:6,whiteSpace:"nowrap",minWidth:150}}>
          &#128190; Save Config
        </button>
        <button onClick={printPDF} style={{pointerEvents:"all",background:"#0f4c81",color:"#fff",border:"none",borderRadius:20,padding:"8px 18px",fontSize:12,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 16px rgba(0,0,0,.3)",display:"flex",alignItems:"center",justifyContent:"center",gap:6,whiteSpace:"nowrap",minWidth:150}}>
          &#128438; Print / PDF
        </button>
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>

<script>
window.onerror=function(m,s,l,c,e){var box=document.getElementById('err-box');if(box){box.style.display='block';box.textContent+='ERROR: '+m+'\nLine: '+l+', Col: '+c+'\n'+(e&&e.stack?e.stack:'')+'\n\n';}};

<script>
(function(){var sel=document.getElementById('ck-site-sel');if(!sel)return;fetch('/api/sites').then(function(r){return r.json()}).then(function(sites){sites.forEach(function(s){var o=document.createElement('option');o.value=s.id;o.textContent=s.address;if(s.active)o.selected=true;sel.appendChild(o)})}).catch(function(){sel.remove();var w=document.getElementById('ck-addr-wrap');if(w)w.style.cursor='default';var a=document.getElementById('ck-addr-arrow');if(a)a.style.display='none'})})();
// Dark mode: fix React inline backgrounds AND text colors after render
(function(){if(document.documentElement.getAttribute('data-theme')!=='dark')return;
function fix(){document.querySelectorAll('#root *').forEach(function(el){
var cs=getComputedStyle(el);
// Fix solid backgrounds — any light bg gets forced dark
var bg=cs.backgroundColor;
if(bg&&bg!=='transparent'&&bg!=='rgba(0, 0, 0, 0)'){
var m=bg.match(/rgb\((\d+),\s*(\d+),\s*(\d+)/);
if(m){var r=+m[1],g=+m[2],b=+m[3],lum=(r*299+g*587+b*114)/1000;
if(lum>130){el.style.backgroundColor='#1e293b';el.style.borderColor='#334155';}}}
// Fix gradient backgrounds
var bi=cs.backgroundImage;
if(bi&&bi.indexOf('gradient')!==-1&&bi.match(/rgb\(2[2-5]\d/)){
el.style.background='linear-gradient(135deg,#1e293b,#0f172a)';el.style.borderColor='#334155';}
// Fix text colors — dark text to light, preserve intentional colors
var fc=cs.color;
if(fc){var cm=fc.match(/rgb\((\d+),\s*(\d+),\s*(\d+)/);
if(cm){var cr=+cm[1],cg=+cm[2],cb=+cm[3];
var isGray=(Math.abs(cr-cg)<30&&Math.abs(cg-cb)<30);
var isDark=(cr*299+cg*587+cb*114)/1000<100;
if(isGray&&isDark){el.style.color='#e2e8f0';}
else if(isGray&&(cr*299+cg*587+cb*114)/1000<180){el.style.color='#94a3b8';}
// Preserve: green, red, purple, orange, blue — don't touch
}}
// Fix low-opacity text
if(el.style.opacity&&parseFloat(el.style.opacity)<0.6){el.style.opacity='0.85';}
});}
setTimeout(fix,80);setTimeout(fix,300);setTimeout(fix,800);
new MutationObserver(function(){setTimeout(fix,50)}).observe(document.getElementById('root')||document.body,{childList:true,subtree:true});
})();
</script>
